version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: otc_postgres
    restart: always
    environment:
      POSTGRES_USER: otc_user
      POSTGRES_PASSWORD: otc_pass
      POSTGRES_DB: otc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otc_user -d otc_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
